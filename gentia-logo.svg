<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#111c3a" />
    </linearGradient>

    <!-- Circular Badge Radial Gradient -->
    <radialGradient id="circleGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#233554" />
      <stop offset="70%" stop-color="#16223b" />
      <stop offset="100%" stop-color="#0f172a" />
    </radialGradient>

    <!-- Emerald Icon Color Gradient -->
    <linearGradient id="emeraldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Soft Shadow for Circle -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <!-- Dotted Grid Pattern -->
    <pattern id="dotGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="#1e293b" opacity="0.5" />
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)" />

  <!-- Dotted Grid Overlay -->
  <rect width="100%" height="100%" fill="url(#dotGrid)" />

  <!-- Circular Outer Glow / Soft Circle -->
  <circle cx="250" cy="250" r="185" fill="none" stroke="#233554" stroke-width="4" opacity="0.3" />
  
  <!-- Circular Badge -->
  <circle cx="250" cy="250" r="180" fill="url(#circleGradient)" filter="url(#softShadow)" stroke="#1e293b" stroke-width="2" />
  
  <!-- Subtle Inner Ring -->
  <circle cx="250" cy="250" r="179" fill="none" stroke="#334155" stroke-width="1" opacity="0.4" />

  <!-- Central Logo (4 Rotated Rounded Squares/Diamonds) -->
  <g transform="translate(250, 250) rotate(45)">
    <!-- Top-Left (which rotates to Left) -->
    <rect x="-42" y="-42" width="34" height="34" rx="9" ry="9" 
          fill="none" stroke="url(#emeraldGradient)" stroke-width="7.5" stroke-linejoin="round" />

    <!-- Top-Right (which rotates to Top) -->
    <rect x="8" y="-42" width="34" height="34" rx="9" ry="9" 
          fill="none" stroke="url(#emeraldGradient)" stroke-width="7.5" stroke-linejoin="round" />

    <!-- Bottom-Left (which rotates to Bottom) -->
    <rect x="-42" y="8" width="34" height="34" rx="9" ry="9" 
          fill="none" stroke="url(#emeraldGradient)" stroke-width="7.5" stroke-linejoin="round" />

    <!-- Bottom-Right (which rotates to Right) -->
    <rect x="8" y="8" width="34" height="34" rx="9" ry="9" 
          fill="none" stroke="url(#emeraldGradient)" stroke-width="7.5" stroke-linejoin="round" />
  </g>
</svg>
